<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interactive UI</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="bg-animation"></div>

  <main class="container hero-section landing-hero">

    <section class="landing-content">

      <h1 class="main-title">
        Modern<br>
        Authentication UI
      </h1>

      <p class="subtitle">
        Responsive Login & Registration System using HTML, CSS,
        JavaScript & Bootstrap 5.
      </p>

      <div class="button-group landing-actions">

        <a href="login.html" class="custom-btn">
          Login
        </a>

        <a href="register.html" class="custom-btn secondary-btn">
          Register
        </a>

      </div>

    </section>

    <section class="glass-card landing-feature text-center">

      <div class="feature-icon" aria-hidden="true">
        <svg viewBox="0 0 96 96" role="img">
          <path d="M38 45c10.5 0 19-8.5 19-19S48.5 7 38 7 19 15.5 19 26s8.5 19 19 19Z"/>
          <path d="M9 83c2.9-17.2 14.2-28 29-28 7.1 0 13.3 2.5 18.1 7"/>
          <path d="M66 50 86 58v10c0 11.3-7.6 18.9-20 23-12.4-4.1-20-11.7-20-23V58l20-8Z"/>
          <path d="M66 60v20"/>
        </svg>
      </div>

      <h2>
        Secure Auth UI
      </h2>

      <p>
        Modern responsive authentication pages with smooth animations,
        password toggle, validations & Bootstrap UI.
      </p>

    </section>

  </main>

</body>
</html>
